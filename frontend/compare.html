<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Generate Final Resume</title>


<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: #0f172a;
    color: white;
    text-align: center;
}

.container {
    padding: 40px;
}

input {
    margin: 10px;
}

button {
    padding: 12px 25px;
    margin: 15px;
    border: none;
    border-radius: 10px;
    background: #16a34a;
    color: white;
    cursor: pointer;
    font-size: 16px;
}

button:hover {
    background: #15803d;
}

#result {
    margin-top: 20px;
    white-space: pre-wrap;
    background: #1e293b;
    padding: 20px;
    border-radius: 10px;
    text-align: left;
}


#result b { color: #38bdf8; }
#result h3 { color: #60a5fa; }
#result ul { margin-left: 20px; }
</style>
</head>

<body>

<div class="container">
    <h2>👩🏻‍💻 Generate Final Resume</h2>

    <input type="file" id="file1"><br>
    <input type="file" id="file2"><br>

    <button onclick="generate()">Generate Final Resume</button>

    
    <button onclick="downloadPDF()">📄 Download PDF</button>

    <div id="result"></div>

    <br>
    <button onclick="goHome()">🏠 Home</button>
</div>

<script>

function goHome() {
    window.location.href = "index.html";
}


function formatText(text) {
    text = text.replace(/\*\*(.*?)\*\*/g, "<b>$1</b>");
    text = text.replace(/### (.*?)(\n|$)/g, "<h3>$1</h3>");
    text = text.replace(/- (.*?)(\n|$)/g, "<li>$1</li>");
    text = text.replace(/(<li>.*<\/li>)/g, "<ul>$1</ul>");
    text = text.replace(/\n/g, "<br>");
    return text;
}


function generate() {
    const f1 = document.getElementById("file1").files[0];
    const f2 = document.getElementById("file2").files[0];

    if (!f1 || !f2) {
        alert("Please upload both resumes");
        return;
    }

    const fd = new FormData();
    fd.append("file1", f1);
    fd.append("file2", f2);

    document.getElementById("result").innerHTML = "Generating final resume...";

   
    fetch("http://localhost:8080/merge", {
        method: "POST",
        body: fd
    })
    .then(res => res.text())
    .then(data => {
        document.getElementById("result").innerHTML = formatText(data);
    })
    .catch(() => {
        document.getElementById("result").innerHTML = "⚠️ Error generating resume";
    });
}
function downloadPDF() {

    const content = document.getElementById("result").innerText;

    if (!content.trim()) {
        alert("No resume to download!");
        return;
    }

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    let y = 20;

    const now = new Date().toLocaleString();

    
    doc.setFont("Helvetica", "bold");
    doc.setFontSize(22);
    doc.text("Final Resume Report", 10, y);

    y += 8;

    
    doc.setFont("Helvetica", "normal");
    doc.setFontSize(11);
    doc.text("Generated on: " + now, 10, y);

    y += 5;

    
    doc.setLineWidth(0.5);
    doc.line(10, y, 200, y);

    y += 10;

    
    let text = content
        .replace(/\*\*/g, "")
        .replace(/###/g, "")
        .replace(/•/g, "-");

    const lines = doc.splitTextToSize(text, 180);

    
    lines.forEach(line => {

        
        if (
            line.match(/skills|education|projects|summary|suggestions|job roles|score/i)
        ) {
            doc.setFont("Helvetica", "bold");
            doc.setFontSize(14);
            y += 3; 
        } else {
            doc.setFont("Helvetica", "normal");
            doc.setFontSize(12);
        }

       
        if (y > 280) {
            doc.addPage();

           
            doc.setFont("Helvetica", "bold");
            doc.setFontSize(18);
            doc.text("Final Resume Report", 10, 15);

            doc.setFont("Helvetica", "normal");
            doc.setFontSize(10);
            doc.text("Generated on: " + now, 10, 22);

            doc.line(10, 26, 200, 26);

            y = 35;
        }

        doc.text(line, 10, y);
        y += 7;
    });

    
    doc.setFontSize(10);
    doc.setFont("Helvetica", "italic");
    doc.text("Generated by Resume AI Assistant", 10, 290);

    doc.save("Final_Resume_Report.pdf");
}
</script>

</body>
</html>
